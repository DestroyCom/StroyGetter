services:
  stroygetter:
    container_name: stroygetter
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file: .env
    volumes:
      - ./data:/temp/stroygetter:rw
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
